version: 2

models:
  - name: fact_orders
    description: "Order-level fact table with revenue and customer attributes."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: items_count
        description: "Number of items in the order."
      - name: total_order_value
        description: "Total value of the order (items + freight)."
